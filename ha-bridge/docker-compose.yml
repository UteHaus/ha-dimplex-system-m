# Einfaches Test-Setup: Mosquitto (MQTT-Broker) + Home Assistant + UHI->HA Bridge.
# Ziel: Waermepumpen-Daten in HA anzeigen/historisieren und Werte setzen,
# ohne UHI selbst zu veraendern (nur vorhandene Endpunkte/Socket werden genutzt).
#
# Start:  docker compose up --build
# HA UI:  http://localhost:8123
# MQTT:   localhost:1883
#
# Die Bridge verbindet sich mit UHI. UHI laeuft i.d.R. NICHT in diesem Compose,
# sondern lokal (Simulationsmodus) auf dem Host. Daher host.docker.internal.

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: uhi-ha-mosquitto
    restart: unless-stopped
    ports:
      - '1883:1883'
      - '9001:9001'
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: uhi-ha-homeassistant
    restart: unless-stopped
    depends_on:
      - mosquitto
    ports:
      - '8123:8123'
    volumes:
      - ./homeassistant:/config
      # Native Custom Component (HACS-kompatibel) zum Testen einbinden.
      - ../ha-integration/custom_components/dimplex_uhi:/config/custom_components/dimplex_uhi
    environment:
      - TZ=Europe/Berlin

  # SSH-Tunnel zur UHI-API: Firewall bleibt an, keine UHI-Aenderung noetig.
  # Benoetigt SSH-Key-Auth (Container kann kein Passwort eingeben):
  #   1) Key erzeugen:   ssh-keygen -t ed25519 -N '' -f ../tools/tunnel/keys/id_uhi
  #   2) Key aufs Geraet: ssh-copy-id -i ../tools/tunnel/keys/id_uhi.pub pi@192.168.178.79
  # Andere Services erreichen UHI danach unter http://uhi-tunnel:8080
  uhi-tunnel:
    build: ../tools/tunnel
    container_name: uhi-ha-tunnel
    restart: unless-stopped
    environment:
      - SSH_USER=pi
      - SSH_HOST=192.168.178.79
      - SSH_PORT=22
      - LOCAL_PORT=8080
      - API_PORT=80
      - SSH_KEY=/keys/id_uhi
      - AUTOSSH_GATETIME=0
    volumes:
      - ../tools/tunnel/keys:/keys:ro

  bridge:
    build: ./bridge
    container_name: uhi-ha-bridge
    restart: unless-stopped
    depends_on:
      - mosquitto
      - uhi-tunnel
    # Optional: deviceKeys.json aus dem UHI-Repo fuer Metadaten einbinden.
    volumes:
      - ../../uhi/external/communicator/config/deviceKeys.json:/data/deviceKeys.json:ro
      # Lesbare Namen (DE) aus der Integration als Namensquelle der Bridge.
      - ../ha-integration/custom_components/dimplex_uhi/data/names_de.json:/data/names_de.json:ro
    environment:
      - MQTT_URL=mqtt://mosquitto:1883
      # UHI ueber den SSH-Tunnel-Container erreichen.
      - UHI_BASE_URL=http://uhi-tunnel:8080
      - UHI_SOCKET_URL=http://uhi-tunnel:8080
      - DEVICE_KEYS_PATH=/data/deviceKeys.json
      - NAMES_PATH=/data/names_de.json
      # Optional, falls UHI Auth verlangt:
      # - UHI_BEARER_TOKEN=
      # - UHI_DEVICE_ID=
      - LOG_LEVEL=info
      - NODE_ID=dimplex-m-bridge
      - HA_DISCOVERY_PREFIX=homeassistant

volumes:
  mosquitto-data:
  mosquitto-log:
