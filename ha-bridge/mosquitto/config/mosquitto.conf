# Minimaler Test-Broker. Fuer lokale Tests anonymer Zugriff erlaubt.
# Fuer Produktion: anonyme Verbindungen deaktivieren und Auth/TLS einrichten.

listener 1883
allow_anonymous true

# Optionaler WebSocket-Listener (z. B. fuer Debug-Tools im Browser)
listener 9001
protocol websockets

persistence true
persistence_location /mosquitto/data/
log_dest stdout
